name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  build:
    name: Build ${{ matrix.asset }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            asset: io-darwin-arm64
          - goos: darwin
            goarch: amd64
            asset: io-darwin-amd64
          - goos: linux
            goarch: arm64
            asset: io-linux-arm64
          - goos: linux
            goarch: amd64
            asset: io-linux-amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "dist/${{ matrix.asset }}" ./cmd/io

      - name: Archive
        run: zip -j "dist/${{ matrix.asset }}.zip" "dist/${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      darwin_arm64_sha: ${{ steps.sha.outputs.darwin_arm64 }}
      darwin_amd64_sha: ${{ steps.sha.outputs.darwin_amd64 }}
      linux_arm64_sha: ${{ steps.sha.outputs.linux_arm64 }}
      linux_amd64_sha: ${{ steps.sha.outputs.linux_amd64 }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA256 sums
        id: sha
        run: |
          sha256sum *.zip > checksums.txt
          echo "darwin_arm64=$(sha256sum io-darwin-arm64.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "darwin_amd64=$(sha256sum io-darwin-amd64.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum io-linux-arm64.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(sha256sum io-linux-amd64.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            *.zip
            checksums.txt

  homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: paradise-runner/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Render formula
        env:
          VERSION: ${{ github.ref_name }}
          DARWIN_ARM64_SHA: ${{ needs.release.outputs.darwin_arm64_sha }}
          DARWIN_AMD64_SHA: ${{ needs.release.outputs.darwin_amd64_sha }}
          LINUX_ARM64_SHA: ${{ needs.release.outputs.linux_arm64_sha }}
          LINUX_AMD64_SHA: ${{ needs.release.outputs.linux_amd64_sha }}
        run: |
          cat > homebrew-tap/io.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          # DO NOT EDIT. Generated by release workflow.
          class Io < Formula
            desc "Personal AI assistant TUI backed by Claude Code or Codex CLI"
            homepage "https://github.com/paradise-runner/io"
            version "${VERSION#v}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/paradise-runner/io/releases/download/${VERSION}/io-darwin-arm64.zip"
                sha256 "${DARWIN_ARM64_SHA}"

                def install
                  bin.install "io-darwin-arm64" => "io"
                end
              else
                url "https://github.com/paradise-runner/io/releases/download/${VERSION}/io-darwin-amd64.zip"
                sha256 "${DARWIN_AMD64_SHA}"

                def install
                  bin.install "io-darwin-amd64" => "io"
                end
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/paradise-runner/io/releases/download/${VERSION}/io-linux-arm64.zip"
                sha256 "${LINUX_ARM64_SHA}"

                def install
                  bin.install "io-linux-arm64" => "io"
                end
              else
                url "https://github.com/paradise-runner/io/releases/download/${VERSION}/io-linux-amd64.zip"
                sha256 "${LINUX_AMD64_SHA}"

                def install
                  bin.install "io-linux-amd64" => "io"
                end
              end
            end

            def caveats
              <<~EOS
                io drives an authenticated Claude Code or Codex CLI. Install and authenticate at least one before launching io.
              EOS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/io --version")
            end
          end
          EOF

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add io.rb
          git diff --cached --quiet || git commit -m "io ${GITHUB_REF_NAME}"
          git push
